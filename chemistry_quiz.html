<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Жалпы Химия — Емтихан Дайындығы</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2ff;
    --card: #ffffff;
    --primary: #4b5eff;
    --primary-dark: #3344dd;
    --accent: #ff4b8b;
    --green: #26c281;
    --red: #ff4b4b;
    --yellow: #ffc107;
    --purple: #9b59b6;
    --text: #1a1a2e;
    --text-light: #6b7280;
    --shadow: 0 8px 32px rgba(75,94,255,0.13);
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
  }

  /* ===== SPLASH SCREEN ===== */
  #splash {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #4b5eff 0%, #9b59b6 50%, #ff4b8b 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000; transition: opacity 0.6s;
  }
  #splash h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.5rem, 6vw, 4rem);
    color: #fff; text-align: center;
    text-shadow: 0 4px 20px rgba(0,0,0,0.3);
    margin-bottom: 12px;
  }
  #splash p { color: rgba(255,255,255,0.85); font-size: 1.2rem; margin-bottom: 40px; }
  #splash .stats {
    display: flex; gap: 24px; margin-bottom: 40px;
  }
  #splash .stat-box {
    background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 16px; padding: 20px 32px; text-align: center; color: #fff;
  }
  #splash .stat-box .num { font-size: 2.5rem; font-weight: 900; font-family: 'Fredoka One', cursive; }
  #splash .stat-box .label { font-size: 0.9rem; opacity: 0.8; }
  #startBtn {
    background: #fff; color: var(--primary);
    border: none; border-radius: 50px;
    padding: 18px 56px; font-size: 1.3rem;
    font-weight: 800; font-family: 'Nunito', sans-serif;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  #startBtn:hover { transform: scale(1.06); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
  #splash .author {
    margin-top: 24px;
    color: rgba(255,255,255,0.55);
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  #splash .author span {
    color: rgba(255,255,255,0.9);
    font-weight: 800;
  }

  /* ===== HEADER ===== */
  #header {
    background: linear-gradient(135deg, #4b5eff, #9b59b6);
    padding: 0 24px;
    display: none; align-items: center; justify-content: space-between;
    height: 72px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(75,94,255,0.3);
  }
  #header.visible { display: flex; }
  #header .logo {
    font-family: 'Fredoka One', cursive;
    color: #fff; font-size: 1.6rem;
  }
  #progress-container {
    flex: 1; margin: 0 24px;
    background: rgba(255,255,255,0.25);
    border-radius: 100px; height: 10px; overflow: hidden;
  }
  #progress-bar {
    height: 100%; background: #fff;
    border-radius: 100px;
    transition: width 0.4s cubic-bezier(.34,1.56,.64,1);
    width: 0%;
  }
  #score-display {
    background: rgba(255,255,255,0.2);
    color: #fff; border-radius: 50px;
    padding: 6px 18px; font-weight: 800;
    font-size: 1rem;
  }

  /* ===== MAIN QUIZ AREA ===== */
  #quiz-area {
    display: none;
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }
  #quiz-area.visible { display: block; }

  /* Question card */
  .q-header {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 24px;
  }
  .q-number {
    background: linear-gradient(135deg, #4b5eff, #9b59b6);
    color: #fff; border-radius: 14px;
    padding: 10px 18px; font-weight: 900;
    font-size: 1rem; white-space: nowrap;
  }
  .q-category {
    background: rgba(75,94,255,0.1);
    color: var(--primary); border-radius: 50px;
    padding: 6px 16px; font-size: 0.85rem;
    font-weight: 700;
  }
  .q-points {
    margin-left: auto;
    background: #fff5cc; color: #996600;
    border-radius: 50px; padding: 6px 14px;
    font-weight: 800; font-size: 0.9rem;
  }

  .question-card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 36px 40px;
    margin-bottom: 24px;
    animation: slideIn 0.4s cubic-bezier(.34,1.56,.64,1);
    border: 2px solid transparent;
  }
  @keyframes slideIn {
    from { opacity:0; transform: translateY(24px) scale(0.97); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }
  .question-text {
    font-size: 1.25rem; font-weight: 800;
    line-height: 1.5; margin-bottom: 32px;
    color: var(--text);
  }
  .formula {
    font-family: 'Courier New', monospace;
    background: #f0f2ff; padding: 2px 8px;
    border-radius: 6px; font-size: 1.05em;
  }

  /* Answer options */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .option-btn {
    background: #f8f9ff;
    border: 2.5px solid #e5e8ff;
    border-radius: 16px;
    padding: 18px 22px;
    font-size: 1rem; font-weight: 700;
    font-family: 'Nunito', sans-serif;
    text-align: left; cursor: pointer;
    transition: all 0.18s;
    display: flex; align-items: flex-start; gap: 14px;
    line-height: 1.4;
    min-height: 64px;
  }
  .option-btn:hover:not(:disabled) {
    background: #eef0ff;
    border-color: var(--primary);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(75,94,255,0.15);
  }
  .opt-letter {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, #4b5eff, #9b59b6);
    color: #fff; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 0.95rem;
    flex-shrink: 0;
  }
  .option-btn.correct {
    background: #e8faf2; border-color: var(--green);
  }
  .option-btn.correct .opt-letter { background: var(--green); }
  .option-btn.wrong {
    background: #fff0f0; border-color: var(--red);
  }
  .option-btn.wrong .opt-letter { background: var(--red); }
  .option-btn.reveal-correct {
    background: #e8faf2; border-color: var(--green);
    animation: pulse 0.4s;
  }
  .option-btn.reveal-correct .opt-letter { background: var(--green); }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
  .option-btn:disabled { cursor: default; }

  /* Feedback */
  .feedback {
    margin-top: 20px; padding: 16px 22px;
    border-radius: 14px; font-weight: 700;
    font-size: 1rem; display: none;
    align-items: center; gap: 12px;
    animation: fadeIn 0.3s;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .feedback.show { display: flex; }
  .feedback.correct-fb { background: #e8faf2; color: #1a8a5a; }
  .feedback.wrong-fb { background: #fff0f0; color: #cc2222; }
  .feedback .fb-icon { font-size: 1.5rem; }

  /* Explanation */
  .explanation {
    background: #f8f4ff; border-left: 4px solid var(--purple);
    border-radius: 0 14px 14px 0;
    padding: 14px 18px; margin-top: 12px;
    font-size: 0.95rem; color: #4a3a6e;
    display: none; font-weight: 600; line-height: 1.6;
  }
  .explanation.show { display: block; animation: fadeIn 0.3s; }

  /* Next button */
  #nextBtn {
    display: none; width: 100%;
    background: linear-gradient(135deg, #4b5eff, #9b59b6);
    color: #fff; border: none; border-radius: 16px;
    padding: 20px; font-size: 1.15rem;
    font-weight: 800; font-family: 'Nunito', sans-serif;
    cursor: pointer; transition: all 0.2s; margin-top: 8px;
  }
  #nextBtn.show { display: block; animation: slideIn 0.3s; }
  #nextBtn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(75,94,255,0.4); }

  /* Timer */
  #timer-ring {
    position: fixed; bottom: 28px; right: 28px;
    width: 70px; height: 70px;
    background: #fff; border-radius: 50%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; z-index: 50;
    display: none;
  }
  #timer-ring.visible { display: flex; }
  #timer-num {
    font-size: 1.5rem; font-weight: 900;
    font-family: 'Fredoka One', cursive;
    color: var(--primary);
  }

  /* ===== RESULTS ===== */
  #results {
    display: none;
    max-width: 720px; margin: 0 auto;
    padding: 40px 20px 60px;
    animation: slideIn 0.5s;
  }
  #results.visible { display: block; }
  .results-card {
    background: #fff; border-radius: 28px;
    box-shadow: var(--shadow);
    padding: 48px 40px; text-align: center;
  }
  .results-emoji { font-size: 5rem; margin-bottom: 16px; }
  .results-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.5rem; color: var(--primary);
    margin-bottom: 8px;
  }
  .results-subtitle { color: var(--text-light); font-size: 1.1rem; margin-bottom: 40px; }
  .score-circle {
    width: 180px; height: 180px;
    background: linear-gradient(135deg, #4b5eff, #9b59b6);
    border-radius: 50%; margin: 0 auto 36px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    box-shadow: 0 16px 48px rgba(75,94,255,0.35);
  }
  .score-circle .pct {
    font-family: 'Fredoka One', cursive;
    font-size: 3.5rem; color: #fff; line-height: 1;
  }
  .score-circle .score-label { color: rgba(255,255,255,0.8); font-size: 1rem; font-weight: 700; }
  .stats-row {
    display: flex; gap: 16px; margin-bottom: 36px;
    justify-content: center;
  }
  .stat-pill {
    padding: 14px 28px; border-radius: 14px;
    font-weight: 800; font-size: 1.1rem;
  }
  .stat-pill.green { background: #e8faf2; color: #1a8a5a; }
  .stat-pill.red { background: #fff0f0; color: #cc2222; }
  .stat-pill.blue { background: #eef0ff; color: var(--primary); }
  #restartBtn {
    background: linear-gradient(135deg, #4b5eff, #9b59b6);
    color: #fff; border: none; border-radius: 14px;
    padding: 18px 48px; font-size: 1.2rem;
    font-weight: 800; font-family: 'Nunito', sans-serif;
    cursor: pointer; transition: all 0.2s; margin-right: 12px;
  }
  #restartBtn:hover { transform: scale(1.04); }
  #reviewBtn {
    background: #f0f2ff; color: var(--primary);
    border: none; border-radius: 14px;
    padding: 18px 32px; font-size: 1.1rem;
    font-weight: 800; font-family: 'Nunito', sans-serif;
    cursor: pointer; transition: all 0.2s;
  }
  #reviewBtn:hover { background: #e5e8ff; }

  /* Leaderboard / answer review */
  #review-section { margin-top: 36px; }
  .review-item {
    background: #f8f9ff; border-radius: 14px;
    padding: 18px 22px; margin-bottom: 12px;
    text-align: left; display: flex; gap: 14px; align-items: flex-start;
  }
  .review-icon { font-size: 1.3rem; flex-shrink: 0; margin-top: 2px; }
  .review-q { font-weight: 700; font-size: 0.95rem; color: var(--text); margin-bottom: 6px; }
  .review-ans { font-size: 0.88rem; color: var(--text-light); font-weight: 600; }
  .review-ans span { font-weight: 800; }
  .review-ans .correct-ans { color: var(--green); }
  .review-ans .wrong-ans { color: var(--red); }

  @media (max-width: 600px) {
    .options-grid { grid-template-columns: 1fr; }
    .question-card { padding: 24px 20px; }
    .stats-row { flex-wrap: wrap; }
    #splash .stats { flex-direction: column; }
  }

  /* Floating confetti on result */
  .confetti-piece {
    position: fixed; top: -10px;
    width: 10px; height: 10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    z-index: 9999; pointer-events: none;
  }
  @keyframes confettiFall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <h1>⚗️ Жалпы Химия</h1>
  <p>Емтихан дайындығы · 2026</p>
  <div class="stats">
    <div class="stat-box"><div class="num" id="totalQCount">100+</div><div class="label">Сұрақ</div></div>
    <div class="stat-box"><div class="num">16</div><div class="label">Тақырып</div></div>
    <div class="stat-box"><div class="num">4</div><div class="label">Таңдау</div></div>
  </div>
  <button id="startBtn" onclick="startQuiz()">🚀 Бастау</button>
  <div class="author">Created by <span>Altynbek</span></div>
</div>

<!-- HEADER -->
<div id="header">
  <div class="logo">⚗️ ChemQuiz</div>
  <div id="progress-container"><div id="progress-bar"></div></div>
  <div id="score-display">⭐ <span id="score-num">0</span></div>
</div>

<!-- QUIZ -->
<div id="quiz-area">
  <div class="q-header">
    <div class="q-number" id="q-num-label">1 / 100</div>
    <div class="q-category" id="q-category-label">Категория</div>
    <div class="q-points">+100 ⭐</div>
  </div>
  <div class="question-card" id="question-card">
    <div class="question-text" id="question-text"></div>
    <div class="options-grid" id="options-grid"></div>
    <div class="feedback" id="feedback">
      <span class="fb-icon" id="fb-icon"></span>
      <span id="fb-text"></span>
    </div>
    <div class="explanation" id="explanation"></div>
  </div>
  <button id="nextBtn" onclick="nextQuestion()">Келесі сұрақ →</button>
</div>

<!-- RESULTS -->
<div id="results">
  <div class="results-card">
    <div class="results-emoji" id="results-emoji">🎉</div>
    <div class="results-title" id="results-title">Керемет!</div>
    <div class="results-subtitle" id="results-subtitle">Нәтижеңіз</div>
    <div class="score-circle">
      <div class="pct" id="pct-display">0%</div>
      <div class="score-label">дұрыс жауап</div>
    </div>
    <div class="stats-row">
      <div class="stat-pill green">✅ <span id="correct-count">0</span> дұрыс</div>
      <div class="stat-pill red">❌ <span id="wrong-count">0</span> қате</div>
      <div class="stat-pill blue">⭐ <span id="final-score">0</span> ұпай</div>
    </div>
    <button id="restartBtn" onclick="restartQuiz()">🔄 Қайта ойнау</button>
    <button id="reviewBtn" onclick="showReview()">📋 Қателерді қарау</button>
    <div id="review-section" style="display:none"></div>
  </div>
</div>

<div id="timer-ring" class="visible" style="display:none">
  <div id="timer-num">30</div>
  <div style="font-size:0.6rem;color:#aaa;font-weight:700">сек</div>
</div>

<script>
const QUESTIONS = [
  // ====== 1. АТОМ ҚҰРЫЛЫСЫ ======
  {
    cat: "Атом құрылысы",
    q: "²⁷₁₃Э атомындағы протон, нейтрон және электрон сандары қандай?",
    opts: ["13 протон, 14 нейтрон, 13 электрон","13 протон, 27 нейтрон, 14 электрон","27 протон, 13 нейтрон, 27 электрон","14 протон, 13 нейтрон, 27 электрон"],
    ans: 0,
    exp: "Атом нөмірі (Z=13) — протондар саны = электрондар саны = 13. Нейтрондар = масса саны − протон = 27 − 13 = 14."
  },

  // ====== 2. БЕЙОРГАНИКАЛЫҚ ҚОСЫЛЫСТАР ======
  {
    cat: "Бейорганикалық қосылыстар",
    q: "Тек оксидтерден тұратын қатарды көрсетіңіз:",
    opts: ["KOH, CO₂, NaCl, MgO","CaO, SO₂, Al₂O₃, P₂O₅","H₂O, H₂SO₄, NO, BaO","FeO, CuCl₂, Li₂O, K₂O"],
    ans: 1,
    exp: "CaO, SO₂, Al₂O₃, P₂O₅ — барлығы оксидтер (металл немесе бейметалл + оттек). Басқа қатарларда гидроксид, тұз немесе қышқыл бар."
  },
  {
    cat: "Бейорганикалық қосылыстар",
    q: "Тек қышқылдардан тұратын қатарды анықтаңыз:",
    opts: ["NaOH, HCl, KBr, H₂CO₃","H₂S, NaCl, H₂SiO₃, KOH","HCl, H₂SO₄, HNO₃, H₃PO₄","HNO₂, H₂O, MgCl₂, HBr"],
    ans: 2,
    exp: "HCl, H₂SO₄, HNO₃, H₃PO₄ — барлығы қышқылдар. Басқа қатарларда тұздар, негіздер немесе су бар."
  },
  {
    cat: "Бейорганикалық қосылыстар",
    q: "Ерімейтін негіздер орналасқан қатарды белгілеңіз:",
    opts: ["NaOH, KOH, LiOH, Ba(OH)₂","Cu(OH)₂, Fe(OH)₃, Al(OH)₃, Mg(OH)₂","Ca(OH)₂, NH₄OH, Fe(OH)₂, NaOH","Zn(OH)₂, KOH, Ni(OH)₂, LiOH"],
    ans: 1,
    exp: "Cu(OH)₂, Fe(OH)₃, Al(OH)₃, Mg(OH)₂ — ерімейтін негіздер. NaOH, KOH, Ba(OH)₂ — сілтілер (еритін)."
  },
  {
    cat: "Бейорганикалық қосылыстар",
    q: "Тек негіздерден тұратын қатарды таңдаңыз:",
    opts: ["Al(OH)₃, NaCl, Ba(OH)₂, H₂O","NaOH, Ca(OH)₂, KOH, Fe(OH)₃","LiOH, MgO, Cu(OH)₂, HCl","Zn(OH)₂, K₂SO₄, NaOH, CO₂"],
    ans: 1,
    exp: "NaOH, Ca(OH)₂, KOH, Fe(OH)₃ — барлығы негіздер (металл + OH топтары)."
  },
  {
    cat: "Бейорганикалық қосылыстар",
    q: "Негіздік оксидтер орналасқан қатарды белгілеңіз:",
    opts: ["Na₂O, CaO, MgO, BaO","SO₃, P₂O₅, Al₂O₃, Li₂O","CO₂, NO, K₂O, FeO","SiO₂, CrO₃, BeO, ZnO"],
    ans: 0,
    exp: "Na₂O, CaO, MgO, BaO — типтік металдардың оксидтері, сондықтан негіздік оксидтер."
  },
  {
    cat: "Бейорганикалық қосылыстар",
    q: "Тек оттекті қышқылдар орналасқан қатар:",
    opts: ["HCl, HBr, HI, H₂S","H₂SO₄, HNO₃, H₂CO₃, H₃PO₄","HNO₂, HF, H₂SO₃, HCl","HClO₄, H₂S, HNO₃, H₂SiO₃"],
    ans: 1,
    exp: "H₂SO₄, HNO₃, H₂CO₃, H₃PO₄ — барлығы оттегі бар (оттекті) қышқылдар."
  },
  {
    cat: "Бейорганикалық қосылыстар",
    q: "Тек тұздардан тұратын қатарды көрсетіңіз:",
    opts: ["BaSO₄, HCl, Na₂O, KOH","AgNO₃, Cu(OH)₂, FeS, MgO","NaCl, K₂SO₄, CaCO₃, AlCl₃","LiBr, H₃PO₄, ZnCl₂, SO₃"],
    ans: 2,
    exp: "NaCl, K₂SO₄, CaCO₃, AlCl₃ — барлығы тұздар (металл катионы + қышқыл қалдығы)."
  },
  {
    cat: "Бейорганикалық қосылыстар",
    q: "Қышқылдық оксидтер орналасқан қатарды көрсетіңіз:",
    opts: ["CaO, SiO₂, CrO₃, Na₂O","CO₂, SO₂, P₂O₅, N₂O₅","NO₂, SO₃, MgO, Al₂O₃","Cl₂O, BaO, CO, P₂O₃"],
    ans: 1,
    exp: "CO₂, SO₂, P₂O₅, N₂O₅ — бейметалдардың оксидтері, сондықтан қышқылдық оксидтер."

// ===== QUIZ STATE =====
let shuffled = [];
let current = 0;
let score = 0;
let correct = 0;
let wrong = 0;
let userAnswers = [];
let answered = false;

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function startQuiz() {
  shuffled = shuffle(QUESTIONS);
  current = 0; score = 0; correct = 0; wrong = 0; userAnswers = [];
  document.getElementById('splash').style.opacity = '0';
  document.getElementById('totalQCount').textContent = shuffled.length;
  setTimeout(() => {
    document.getElementById('splash').style.display = 'none';
    document.getElementById('header').classList.add('visible');
    document.getElementById('quiz-area').classList.add('visible');
    loadQuestion();
  }, 600);
}

function loadQuestion() {
  answered = false;
  const q = shuffled[current];
  document.getElementById('q-num-label').textContent = `${current+1} / ${shuffled.length}`;
  document.getElementById('q-category-label').textContent = q.cat;
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('score-num').textContent = score;

  // Progress
  document.getElementById('progress-bar').style.width = `${(current/shuffled.length)*100}%`;

  // Options
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  const letters = ['A','B','C','D'];
  // Shuffle options with tracking
  const indices = [0,1,2,3];
  const shuffledIdx = shuffle(indices);
  const correctShuffled = shuffledIdx.indexOf(q.ans);

  shuffledIdx.forEach((origIdx, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.dataset.orig = origIdx;
    btn.dataset.idx = i;
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${q.opts[origIdx]}</span>`;
    btn.onclick = () => selectAnswer(btn, i, correctShuffled, q);
    grid.appendChild(btn);
  });

  // Reset feedback
  const fb = document.getElementById('feedback');
  const exp = document.getElementById('explanation');
  fb.className = 'feedback';
  exp.className = 'explanation';
  fb.textContent = '';
  exp.textContent = '';

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.className = 'nextBtn';
  nextBtn.textContent = current < shuffled.length - 1 ? 'Келесі сұрақ →' : '📊 Нәтижені көру';

  // Animate card
  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideIn 0.4s cubic-bezier(.34,1.56,.64,1)';
}

function selectAnswer(btn, selectedIdx, correctIdx, q) {
  if (answered) return;
  answered = true;

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);

  const isCorrect = selectedIdx === correctIdx;
  const fb = document.getElementById('feedback');
  const fbIcon = document.getElementById('fb-icon');
  const fbText = document.getElementById('fb-text');
  const exp = document.getElementById('explanation');

  if (isCorrect) {
    btn.classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fbIcon.textContent = '🎉';
    fbText.textContent = 'Дұрыс жауап! Керемет!';
    score += 100;
    correct++;
  } else {
    btn.classList.add('wrong');
    btns[correctIdx].classList.add('reveal-correct');
    fb.className = 'feedback wrong-fb show';
    fbIcon.textContent = '❌';
    fbText.textContent = 'Қате. Дұрыс жауапты қараңыз.';
    wrong++;
  }

  exp.className = 'explanation show';
  exp.textContent = '💡 ' + q.exp;

  userAnswers.push({
    q: q.q, cat: q.cat,
    selected: selectedIdx, correct: correctIdx,
    isCorrect,
    correctText: q.opts[q.ans],
    selectedText: q.opts[parseInt(btn.dataset.orig)]
  });

  document.getElementById('score-num').textContent = score;
  document.getElementById('nextBtn').className = 'nextBtn show';
}

function nextQuestion() {
  current++;
  if (current >= shuffled.length) {
    showResults();
  } else {
    loadQuestion();
  }
}

function showResults() {
  document.getElementById('header').classList.remove('visible');
  document.getElementById('quiz-area').classList.remove('visible');
  const results = document.getElementById('results');
  results.classList.add('visible');

  const pct = Math.round((correct/shuffled.length)*100);
  document.getElementById('pct-display').textContent = pct + '%';
  document.getElementById('correct-count').textContent = correct;
  document.getElementById('wrong-count').textContent = wrong;
  document.getElementById('final-score').textContent = score;

  let emoji = '😔', title = 'Жаттығу керек!';
  if (pct >= 90) { emoji = '🏆'; title = 'Тамаша нәтиже!'; }
  else if (pct >= 75) { emoji = '🎉'; title = 'Керемет!'; }
  else if (pct >= 60) { emoji = '👍'; title = 'Жақсы!'; }
  else if (pct >= 40) { emoji = '📚'; title = 'Жалғастыр!'; }

  document.getElementById('results-emoji').textContent = emoji;
  document.getElementById('results-title').textContent = title;
  document.getElementById('results-subtitle').textContent = `${correct}/${shuffled.length} сұраққа дұрыс жауап бердіңіз`;

  if (pct >= 70) launchConfetti();
}

function launchConfetti() {
  const colors = ['#4b5eff','#ff4b8b','#26c281','#ffc107','#9b59b6','#ff6b35'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random()*100 + 'vw';
      c.style.background = colors[Math.floor(Math.random()*colors.length)];
      c.style.width = c.style.height = (8 + Math.random()*8) + 'px';
      c.style.animationDuration = (2 + Math.random()*3) + 's';
      c.style.animationDelay = '0s';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 5000);
    }, i * 40);
  }
}

function restartQuiz() {
  document.getElementById('results').classList.remove('visible');
  document.getElementById('review-section').style.display = 'none';
  startQuiz();
}

function showReview() {
  const sec = document.getElementById('review-section');
  if (sec.style.display === 'block') { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  sec.innerHTML = '<h3 style="font-size:1.2rem;font-weight:800;margin-bottom:16px;color:#1a1a2e">📋 Жауаптар шолуы</h3>';
  userAnswers.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'review-item';
    div.innerHTML = `
      <div class="review-icon">${a.isCorrect ? '✅' : '❌'}</div>
      <div>
        <div class="review-q">${i+1}. ${a.q}</div>
        <div class="review-ans">
          ${a.isCorrect
            ? `<span class="correct-ans">Дұрыс: ${a.correctText}</span>`
            : `<span class="wrong-ans">Сіздің жауабыңыз: ${a.selectedText}</span><br><span class="correct-ans">Дұрыс жауап: ${a.correctText}</span>`
          }
        </div>
      </div>`;
    sec.appendChild(div);
  });
}
